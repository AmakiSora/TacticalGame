name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: docker build --tag tactical-game:ci .
      - run: AUTO_CONTROL_TOKEN=ci-test-token docker compose config --quiet
