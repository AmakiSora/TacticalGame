services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "3123"
      HOST: "0.0.0.0"
      TRUST_PROXY: "false"
      TACTICAL_GAME_STATE_FILE: /app/runtime/games.json
      AUTO_CONTROL_TOKEN: ${AUTO_CONTROL_TOKEN:?Set AUTO_CONTROL_TOKEN in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3123:3123"
    volumes:
      - tactical-game-runtime:/app/runtime
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3123/readyz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  tactical-game-runtime:
    name: tactical-game-runtime
