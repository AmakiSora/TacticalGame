<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>战棋对战 — 玩家控制台</title>
  <link rel="stylesheet" href="/play.css" />
</head>
<body>

<!-- ══════════ 顶部导航 ══════════ -->
<header>
  <h1>⚔️ 战棋对战 <span class="sub">玩家控制台</span></h1>
  <div id="conn-status" class="badge">未连接</div>
</header>

<!-- ══════════ 第一步：加入游戏 ══════════ -->
<section id="join-panel" class="panel">
  <h2>🎮 加入游戏</h2>
  <div class="row">
    <div class="field">
      <label>游戏 ID</label>
      <input id="game-id" placeholder="粘贴 gameId…" />
    </div>
    <div class="field">
      <label>玩家 Token</label>
      <input id="player-token" placeholder="粘贴 token…（留空则创建新游戏）" />
    </div>
  </div>
  <div class="row">
    <div class="field" style="flex:1">
      <label>选择地图</label>
      <select id="map-select"><option value="default">default</option></select>
    </div>
  </div>
  <div class="row actions">
    <button id="btn-create" class="btn primary">➕ 创建新游戏</button>
    <button id="btn-join" class="btn">🔗 加入游戏</button>
    <button id="btn-connect" class="btn success" disabled>✅ 连接</button>
  </div>
  <div id="join-result" class="result"></div>
</section>

<!-- ══════════ 主界面（连接后显示）══════════ -->
<main id="game-ui" class="hidden">

  <!-- 左侧：棋盘 -->
  <div class="board-wrap">
    <canvas id="board" width="840" height="840"></canvas>
    <div id="cell-info" class="cell-info"></div>
    <div id="map-popup" class="map-popup hidden"></div>
    <div id="selection-panel" class="selection-panel">
      <div id="selection-detail" class="selection-detail">点击棋盘上的单位或建筑查看详情</div>
    </div>
  </div>

  <!-- 右侧：侧边栏 -->
  <aside id="sidebar">

    <!-- 回合 & 资源 -->
    <section id="turn-resources">
      <div id="turn-badge" class="turn-badge">回合 —</div>
      <div id="resources-display" class="resources-display"></div>
    </section>

    <!-- 操作提示 -->
    <section id="action-hints">
      <h3>🎯 操作</h3>
      <div class="hint-list">
        <div class="hint"><span class="hint-key">点击己方单位</span> 选中后显示移动/攻击范围</div>
        <div class="hint"><span class="hint-key">点击高亮格子</span> 移动 / 攻击 / 治疗</div>
        <div class="hint"><span class="hint-key">点击己方兵营</span> 弹出生产菜单</div>
        <div class="hint"><span class="hint-key">点击空地</span> 弹出建造菜单（需在范围内）</div>
        <div class="hint"><span class="hint-key">右键 / Esc</span> 取消选择</div>
      </div>
    </section>

    <!-- 快捷操作 -->
    <section id="quick-actions">
      <h3>⚡ 快捷操作</h3>
      <div class="btn-grid">
        <button id="btn-end-turn" class="btn warning">⏭ 结束回合</button>
        <button id="btn-refresh" class="btn">🔄 刷新状态</button>
      </div>
    </section>

    <!-- 事件日志 -->
    <section id="event-log">
      <h3>📜 事件流</h3>
      <ul id="events"></ul>
    </section>

  </aside>
</main>

<!-- 全局提示 -->
<toast id="toast"></toast>

<script src="/play.js"></script>
</body>
</html>
