<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>TacticalGame — 玩家控制台</title>
  <link rel="stylesheet" href="/play.css" />
</head>
<body class="player-shell">

  <header>
    <div class="brand-block">
      <h1>六边形战棋 <span class="sub">玩家控制台</span> <span class="version-badge"></span></h1>
      <div class="page-subtitle">回合指令与战场状态</div>
    </div>
    <div id="conn-status" class="badge">未连接</div>
</header>

  <section id="join-panel" class="panel">
    <h2>游戏大厅</h2>

  <div class="lobby-tabs">
    <button class="lobby-tab active" data-tab="create">创建游戏</button>
    <button class="lobby-tab" data-tab="join">加入游戏</button>
  </div>

  <div id="tab-create" class="lobby-tab-content active">
    <div class="create-setup">
      <div class="field name-field">
        <label>你的名称</label>
        <input id="create-name" placeholder="留空使用默认名称" maxlength="20" />
      </div>
      <div class="field map-field">
        <label>选择地图</label>
        <select id="map-select" hidden><option value="default">default</option></select>
        <div id="map-picker" class="map-picker" role="radiogroup" aria-label="选择地图"></div>
      </div>
    </div>
    <button id="btn-create" class="btn primary" style="margin-top:14px;width:100%">创建新游戏</button>
    <div id="create-result" class="lobby-result hidden">
      <div class="info-row">
        <span class="info-label">Game ID</span>
        <code id="created-game-id" class="info-value"></code>
        <button class="btn-copy" data-copy="created-game-id">复制</button>
      </div>
      <div class="info-row">
        <span class="info-label">Token</span>
        <code id="created-token" class="info-value"></code>
        <button class="btn-copy" data-copy="created-token">复制</button>
      </div>
      <p class="lobby-hint">请保存 Token，将 Game ID 发给对手。</p>
      <button id="btn-connect-create" class="btn success" style="width:100%;margin-top:10px">连接进入游戏</button>
    </div>
  </div>

  <div id="tab-join" class="lobby-tab-content">
    <div class="field">
      <label>游戏 ID</label>
      <input id="game-id" placeholder="粘贴 Game ID…" />
    </div>
    <div class="field" style="margin-top:10px">
      <label>你的名称</label>
      <input id="join-name" placeholder="留空使用默认名称" maxlength="20" />
    </div>
    <button id="btn-join" class="btn primary" style="margin-top:14px;width:100%">加入游戏</button>
    <div id="join-result" class="lobby-result hidden">
      <p class="lobby-status" id="join-status-text"></p>
    </div>
  </div>
</section>

  <main id="game-ui" class="hidden">

  <div id="selection-panel" class="selection-panel">
    <div id="selection-detail" class="selection-detail">点击棋盘上的单位、总部或据点查看详情</div>
  </div>

  <div class="board-panel">
    <div class="board-wrap">
      <canvas id="board" width="840" height="840"></canvas>
      <div id="cell-info" class="cell-info"></div>
      <div id="map-popup" class="map-popup hidden"></div>
    </div>
  </div>

  <aside id="sidebar">

    <section id="turn-resources">
      <div id="turn-badge" class="turn-badge">回合 —</div>
      <div id="actions-display" class="actions-display"></div>
      <div id="resources-display" class="resources-display"></div>
    </section>

    <section id="score-panel"></section>

    <section id="action-hints">
      <h3>操作</h3>
      <div class="hint-list">
        <div class="hint"><span class="hint-key">行动点</span> 每回合最多 5 点；部署/移动/攻击/治疗首次操作一个单位消耗 1 点，同单位的后续动作免费</div>
        <div class="hint"><span class="hint-key">点击己方单位</span> 弹出移动/攻击/治疗选项</div>
        <div class="hint"><span class="hint-key">选择选项后</span> 点击高亮六边形执行</div>
        <div class="hint"><span class="hint-key">点击己方 HQ/据点</span> 弹出部署菜单</div>
        <div class="hint"><span class="hint-key">步兵/侦察兵</span> 站上据点并结束回合即可占领</div>
        <div class="hint"><span class="hint-key">摧毁敌方 HQ</span> 获得胜利</div>
        <div class="hint"><span class="hint-key">右键 / Esc</span> 取消选择</div>
      </div>
    </section>

    <section id="quick-actions">
      <h3>快捷操作</h3>
      <div class="btn-grid">
        <button id="btn-end-turn" class="btn warning">结束回合</button>
        <button id="btn-refresh" class="btn">刷新状态</button>
      </div>
    </section>

    <section id="event-log">
      <h3>事件流</h3>
      <ul id="events"></ul>
    </section>

  </aside>
</main>

<!-- 全局提示 -->
<toast id="toast"></toast>

<script src="/version.js"></script>
<script src="/play.js"></script>
</body>
</html>
