<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>战棋对战 — 玩家控制台</title>
  <link rel="stylesheet" href="/play.css" />
</head>
<body>

<!-- ══════════ 顶部导航 ══════════ -->
<header>
  <h1>⚔️ 战棋对战 <span class="sub">玩家控制台</span></h1>
  <div id="conn-status" class="badge">未连接</div>
</header>

<!-- ══════════ 第一步：加入游戏 ══════════ -->
<section id="join-panel" class="panel">
  <h2>🎮 加入游戏</h2>
  <div class="row">
    <div class="field">
      <label>游戏 ID</label>
      <input id="game-id" placeholder="粘贴 gameId…" />
    </div>
    <div class="field">
      <label>玩家 Token</label>
      <input id="player-token" placeholder="粘贴 token…（留空则创建新游戏）" />
    </div>
  </div>
  <div class="row actions">
    <button id="btn-create" class="btn primary">➕ 创建新游戏</button>
    <button id="btn-join" class="btn">🔗 加入游戏</button>
    <button id="btn-connect" class="btn success" disabled>✅ 连接</button>
  </div>
  <div id="join-result" class="result"></div>
</section>

<!-- ══════════ 主界面（连接后显示）══════════ -->
<main id="game-ui" class="hidden">

  <!-- 左侧：棋盘 -->
  <div class="board-wrap">
    <canvas id="board" width="840" height="840"></canvas>
    <div id="cell-info" class="cell-info"></div>
    <div id="map-popup" class="map-popup hidden"></div>
  </div>

  <!-- 右侧：侧边栏 -->
  <aside id="sidebar">

    <!-- 回合 & 资源 -->
    <section id="turn-resources">
      <div id="turn-badge" class="turn-badge">回合 —</div>
      <div id="resources-display" class="resources-display"></div>
    </section>

    <!-- 快捷操作 -->
    <section id="quick-actions">
      <h3>⚡ 快捷操作</h3>
      <div class="btn-grid">
        <button id="btn-end-turn" class="btn warning">⏭ 结束回合</button>
        <button id="btn-refresh" class="btn">🔄 刷新状态</button>
      </div>
    </section>

    <!-- 操作表单 -->
    <section id="action-forms">
      <h3>🎯 操作</h3>

      <!-- 建造 -->
      <details class="act-group" open>
        <summary>🏗 建造</summary>
        <div class="form">
          <select id="build-type">
            <option value="barracks">兵营 (barracks) — 50金</option>
            <option value="miner">采矿器 (miner) — 30金</option>
          </select>
          <div class="row">
            <div class="field"><label>X</label><input id="build-x" type="number" min="0" max="19" /></div>
            <div class="field"><label>Y</label><input id="build-y" type="number" min="0" max="19" /></div>
          </div>
          <button id="btn-build" class="btn primary">建造</button>
        </div>
      </details>

      <!-- 生产 -->
      <details class="act-group">
        <summary>🏭 生产单位</summary>
        <div class="form">
          <select id="produce-building">
            <option value="">-- 选择兵营 --</option>
          </select>
          <select id="produce-type">
            <option value="infantry">步兵 (infantry) — 10金</option>
            <option value="sniper">狙击手 (sniper) — 20金</option>
            <option value="tank">坦克 (tank) — 40金</option>
            <option value="medic">医疗兵 (medic) — 15金</option>
          </select>
          <button id="btn-produce" class="btn primary">生产</button>
        </div>
      </details>

      <!-- 移动 -->
      <details class="act-group">
        <summary>🚶 移动单位</summary>
        <div class="form">
          <select id="move-unit">
            <option value="">-- 选择单位 --</option>
          </select>
          <div class="row">
            <div class="field"><label>目标 X</label><input id="move-x" type="number" min="0" max="19" /></div>
            <div class="field"><label>目标 Y</label><input id="move-y" type="number" min="0" max="19" /></div>
          </div>
          <button id="btn-move" class="btn">移动</button>
        </div>
      </details>

      <!-- 攻击 -->
      <details class="act-group">
        <summary>💥 攻击</summary>
        <div class="form">
          <select id="attack-unit">
            <option value="">-- 攻击方 --</option>
          </select>
          <select id="attack-target">
            <option value="">-- 目标 --</option>
          </select>
          <button id="btn-attack" class="btn danger">攻击</button>
        </div>
      </details>

      <!-- 治疗 -->
      <details class="act-group">
        <summary>💚 治疗</summary>
        <div class="form">
          <select id="heal-medic">
            <option value="">-- 医疗兵 --</option>
          </select>
          <select id="heal-target">
            <option value="">-- 治疗目标 --</option>
          </select>
          <button id="btn-heal" class="btn success">治疗</button>
        </div>
      </details>

    </section>

    <!-- 事件日志 -->
    <section id="event-log">
      <h3>📜 事件流</h3>
      <ul id="events"></ul>
    </section>

  </aside>
</main>

<!-- 全局提示 -->
<toast id="toast"></toast>

<script src="/play.js"></script>
</body>
</html>
