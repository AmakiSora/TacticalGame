<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:," />
  <title>TacticalGame — 全息观战台</title>
  <style>
    /* ============ 基础与配色（星云全息主题） ============ */
    * { box-sizing: border-box; }
    :root {
      --bg0: #0b0714;
      --bg1: #160e2c;
      --panel: rgba(30, 19, 54, .58);
      --panel-strong: rgba(24, 15, 44, .82);
      --panel-brd: rgba(178, 132, 255, .16);
      --panel-brd-hi: rgba(178, 132, 255, .38);
      --ink: #ece4ff;
      --ink-dim: #a493cc;
      --ink-faint: #6f6096;
      --acc: #b06bff;
      --acc2: #ff5ca8;
      --amber: #ffb347;
      --cyan: #4de3ff;
      --danger: #ff5c7a;
      --mono: "SF Mono", "Consolas", "Courier New", monospace;
      --grad: linear-gradient(120deg, var(--acc), var(--acc2));
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1100px 700px at 85% -10%, rgba(255, 92, 168, .13), transparent 60%),
        radial-gradient(900px 650px at -10% 110%, rgba(77, 227, 255, .10), transparent 55%),
        radial-gradient(700px 500px at 50% 50%, rgba(176, 107, 255, .07), transparent 65%),
        linear-gradient(160deg, var(--bg1), var(--bg0) 70%);
      overflow: hidden;
    }
    /* 漂浮光斑 */
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
    .orb-a { width: 420px; height: 420px; left: -120px; top: -80px; background: rgba(176, 107, 255, .16); animation: drift 26s ease-in-out infinite alternate; }
    .orb-b { width: 360px; height: 360px; right: -100px; bottom: -120px; background: rgba(255, 92, 168, .13); animation: drift 32s ease-in-out infinite alternate-reverse; }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 40px) scale(1.15); }
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(176, 107, 255, .25); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(176, 107, 255, .45); }
    ::-webkit-scrollbar-track { background: transparent; }

    button { font-family: inherit; }
    button:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--acc); outline-offset: 2px; }

    .version-badge {
      display: inline-flex; align-items: center; vertical-align: middle;
      margin-left: 8px; padding: 2px 8px; border-radius: 999px;
      background: rgba(77, 227, 255, .10); border: 1px solid rgba(77, 227, 255, .30);
      color: var(--cyan); font-size: 11px; font-weight: 700; letter-spacing: .5px;
      font-variant-numeric: tabular-nums;
    }

    /* ============ 顶栏 ============ */
    .topbar {
      position: relative; z-index: 60;
      height: 56px; display: flex; align-items: center; gap: 18px;
      padding: 0 18px;
      background: rgba(16, 10, 30, .72);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    }
    .topbar::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--acc), var(--acc2), var(--amber), transparent);
      background-size: 200% 100%;
      animation: borderflow 8s linear infinite;
      opacity: .8;
    }
    @keyframes borderflow { from { background-position: 0% 0; } to { background-position: 200% 0; } }

    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-gem {
      width: 22px; height: 22px; flex-shrink: 0;
      background: var(--grad);
      transform: rotate(45deg);
      border-radius: 5px;
      box-shadow: 0 0 16px rgba(255, 92, 168, .55);
      animation: gemspin 6s ease-in-out infinite;
    }
    @keyframes gemspin {
      0%, 100% { transform: rotate(45deg) scale(1); }
      50% { transform: rotate(225deg) scale(.86); }
    }
    .brand-text h1 { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: 1px; white-space: nowrap; }
    .brand-sub {
      display: block; font-size: 10px; letter-spacing: 3px; color: var(--ink-faint);
      font-weight: 700; text-transform: uppercase; margin-top: 1px;
    }

    .top-status { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
    .live-pill {
      display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0;
      padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 700;
      border: 1px solid rgba(255, 255, 255, .10); background: rgba(255, 255, 255, .04);
      color: var(--ink-dim); transition: all .3s;
    }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #6f6096; transition: all .3s; }
    .live-pill.online { color: #baffec; border-color: rgba(62, 255, 200, .35); background: rgba(62, 255, 200, .07); }
    .live-pill.online .live-dot { background: #3effc8; animation: ping 1.6s ease-out infinite; }
    .live-pill.connecting .live-dot { background: var(--amber); animation: blink 1s ease-in-out infinite; }
    .live-pill.local { color: #ffe3b3; border-color: rgba(255, 179, 71, .35); background: rgba(255, 179, 71, .07); }
    .live-pill.local .live-dot { background: var(--amber); }
    @keyframes ping {
      0% { box-shadow: 0 0 0 0 rgba(62, 255, 200, .55); }
      80%, 100% { box-shadow: 0 0 0 9px rgba(62, 255, 200, 0); }
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .25; } }
    .status-text {
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: var(--mono); font-size: 11.5px; color: var(--ink-faint);
    }

    .top-actions { position: relative; display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 10px; cursor: pointer;
      background: rgba(255, 255, 255, .05); border: 1px solid var(--panel-brd);
      color: var(--ink-dim); font-size: 16px; line-height: 1;
      transition: all .18s;
    }
    .icon-btn:hover { color: var(--ink); border-color: var(--panel-brd-hi); box-shadow: 0 0 14px rgba(176, 107, 255, .25); transform: translateY(-1px); }

    /* 设置弹层 */
    #settings-wrap { position: relative; }
    #settings-popover {
      display: none; position: absolute; right: 0; top: calc(100% + 12px); z-index: 200;
      width: 264px; padding: 14px;
      background: var(--panel-strong); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--panel-brd-hi); border-radius: 14px;
      box-shadow: 0 22px 50px rgba(0, 0, 0, .55);
      animation: popin .18s cubic-bezier(.2, .9, .3, 1.3);
    }
    #settings-popover.open { display: block; }
    @keyframes popin { from { opacity: 0; transform: translateY(-6px) scale(.96); } }
    .setting-form { margin: 0; }
    .toggle-row, .setting-row, .setting-field {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      font-size: 13px; color: var(--ink-dim); padding: 7px 0;
    }
    .setting-field { flex-direction: column; align-items: stretch; gap: 6px; }
    .setting-row input[type="number"], .setting-field input {
      width: 100%; max-width: 90px; padding: 6px 8px; border-radius: 8px;
      background: rgba(255, 255, 255, .06); border: 1px solid var(--panel-brd);
      color: var(--ink); font-size: 13px;
    }
    .setting-field input { max-width: none; }
    .settings-divider { height: 1px; background: var(--panel-brd); margin: 8px 0; }
    .settings-action {
      width: 100%; margin-top: 8px; padding: 8px; border-radius: 10px; cursor: pointer;
      background: var(--grad); border: 0; color: #140b26; font-weight: 800; font-size: 13px;
      transition: all .18s;
    }
    .settings-action:hover { filter: brightness(1.15); box-shadow: 0 4px 18px rgba(255, 92, 168, .35); }
    /* 开关 */
    .toggle { position: relative; width: 38px; height: 22px; flex-shrink: 0; cursor: pointer; }
    .toggle input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
    .toggle .slider {
      position: absolute; inset: 0; border-radius: 999px;
      background: rgba(255, 255, 255, .10); border: 1px solid var(--panel-brd);
      transition: all .25s;
    }
    .toggle .slider::after {
      content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
      border-radius: 50%; background: #8d7cb5; transition: all .25s cubic-bezier(.3, 1.4, .5, 1);
    }
    .toggle input:checked + .slider { background: var(--grad); border-color: transparent; box-shadow: 0 0 12px rgba(255, 92, 168, .4); }
    .toggle input:checked + .slider::after { left: 18px; background: #fff; }

    /* ============ 主布局（驾驶舱三栏） ============ */
    .deck {
      position: relative; z-index: 10;
      display: grid; grid-template-columns: 268px minmax(0, 1fr) 348px; gap: 14px;
      height: calc(100vh - 56px); padding: 14px;
    }
    .panel {
      background: var(--panel);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--panel-brd); border-radius: 18px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, .38), inset 0 1px 0 rgba(255, 255, 255, .05);
    }
    .anim-in { opacity: 0; animation: risein .55s cubic-bezier(.2, .8, .25, 1) forwards; animation-delay: var(--d, 0s); }
    @keyframes risein { from { opacity: 0; transform: translateY(16px) scale(.985); } to { opacity: 1; transform: none; } }

    /* ---- 左侧指挥轨 ---- */
    .rail { padding: 16px 14px; overflow: visible; display: flex; flex-direction: column; gap: 18px; }
    .rail-block h2 {
      margin: 0 0 10px; font-size: 11px; font-weight: 800; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--ink-faint);
      display: flex; align-items: center; gap: 8px;
    }
    .rail-block h2::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--panel-brd-hi), transparent); }
    .rail-row { display: flex; gap: 8px; margin-top: 8px; }
    .rail-btn {
      flex: 1; padding: 8px 10px; border-radius: 10px; cursor: pointer;
      background: rgba(255, 255, 255, .05); border: 1px solid var(--panel-brd);
      color: var(--ink-dim); font-size: 12.5px; font-weight: 700;
      transition: all .18s; white-space: nowrap;
    }
    .rail-btn:hover { color: var(--ink); border-color: var(--panel-brd-hi); background: rgba(176, 107, 255, .10); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0, 0, 0, .3); }
    .rail-btn:active { transform: translateY(0); }
    .rail-btn.danger { color: #ff9db4; border-color: rgba(255, 92, 122, .35); }
    .rail-btn.danger:hover { background: rgba(255, 92, 122, .12); border-color: rgba(255, 92, 122, .6); box-shadow: 0 6px 16px rgba(255, 92, 122, .18); }
    .rail-btn.busy { pointer-events: none; opacity: .6; }
    .rail-btn.busy::before { content: ''; display: inline-block; width: 10px; height: 10px; margin-right: 6px; border-radius: 50%; border: 2px solid rgba(255,255,255,.25); border-top-color: var(--ink); animation: spin .7s linear infinite; vertical-align: -1px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 对局选择器 */
    .game-picker { position: relative; }
    .game-picker select.native-game-select {
      position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none;
    }
    #game-picker-button {
      width: 100%; padding: 10px 34px 10px 12px; cursor: pointer; text-align: left;
      border-radius: 12px; color: var(--ink); font-size: 13px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      background:
        linear-gradient(rgba(24, 15, 44, .9), rgba(24, 15, 44, .9)) padding-box,
        linear-gradient(135deg, rgba(176, 107, 255, .7), rgba(255, 92, 168, .5)) border-box;
      border: 1px solid transparent;
      transition: all .2s; position: relative;
    }
    #game-picker-button:hover { box-shadow: 0 0 18px rgba(176, 107, 255, .28); }
    #game-picker-label { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .game-picker::after {
      content: ''; position: absolute; right: 13px; top: 50%;
      width: 8px; height: 8px; pointer-events: none;
      border-right: 2px solid var(--ink-dim); border-bottom: 2px solid var(--ink-dim);
      transform: translateY(-65%) rotate(45deg); transition: transform .2s;
    }
    .game-picker.open::after { transform: translateY(-35%) rotate(225deg); }
    #game-picker-menu {
      display: none; position: absolute; top: calc(100% + 8px); left: 0; z-index: 220;
      width: min(400px, calc(100vw - 40px)); max-height: 320px; overflow-y: auto;
      padding: 8px; border-radius: 14px;
      background: var(--panel-strong); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--panel-brd-hi);
      box-shadow: 0 22px 50px rgba(0, 0, 0, .55);
      animation: popin .18s cubic-bezier(.2, .9, .3, 1.3);
    }
    .game-picker.open #game-picker-menu { display: flex; flex-direction: column; gap: 6px; }
    .game-picker-option {
      width: 100%; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 6px 10px;
      align-items: center; padding: 9px 10px; cursor: pointer; text-align: left;
      background: rgba(255, 255, 255, .04); border: 1px solid transparent; border-radius: 10px;
      color: var(--ink); transition: all .15s;
    }
    .game-picker-option:hover, .game-picker-option.active {
      background: rgba(176, 107, 255, .12); border-color: var(--panel-brd-hi);
    }
    .game-picker-option .game-id { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font: 700 13px var(--mono); }
    .game-picker-option .game-meta-line { grid-column: 1 / -1; color: var(--ink-faint); font-size: 11.5px; }
    .phase-badge {
      padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700;
      background: rgba(255, 92, 168, .12); border: 1px solid rgba(255, 92, 168, .35); color: #ffb9d9;
    }
    .game-picker-empty { padding: 14px 12px; color: var(--ink-faint); font-size: 13px; text-align: center; }

    /* 图例 */
    .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; font-size: 12px; color: var(--ink-dim); }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; border: 1px solid rgba(255,255,255,.15); }
    .swatch.plain { background: #1d1533; }
    .swatch.water { background: #123a5e; }
    .swatch.blocker { background: #43354f; }
    .swatch.cp { background: transparent; border: 2px dashed var(--amber); border-radius: 50%; }
    .swatch.hq { background: transparent; border: 2px solid var(--cyan); transform: rotate(0); clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0 50%); }
    .swatch.unit { background: #140b26; border: 2px solid var(--acc2); border-radius: 50%; }
    .rail-foot { margin-top: auto; font-size: 10.5px; color: var(--ink-faint); letter-spacing: .5px; line-height: 1.7; }
    .rail-foot kbd {
      padding: 1px 5px; border-radius: 5px; font-family: var(--mono); font-size: 10px;
      background: rgba(255,255,255,.07); border: 1px solid var(--panel-brd);
    }

    /* ---- 中央全息棋盘 ---- */
    .stage {
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      padding: 18px; min-width: 0; min-height: 0;
    }
    #board {
      max-width: 100%; max-height: 100%;
      border-radius: 14px;
      box-shadow: 0 0 0 1px rgba(178, 132, 255, .14), 0 24px 60px rgba(0, 0, 0, .5), 0 0 90px rgba(176, 107, 255, .07);
    }
    .cell-chip {
      position: absolute; top: 14px; right: 14px; z-index: 30;
      padding: 6px 12px; border-radius: 999px;
      font-family: var(--mono); font-size: 11.5px; color: var(--cyan);
      background: rgba(14, 9, 26, .8); border: 1px solid rgba(77, 227, 255, .30);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      opacity: 0; transform: translateY(-4px); transition: all .18s; pointer-events: none;
    }
    .cell-chip.show { opacity: 1; transform: none; }

    /* 悬浮检查器 */
    .inspector {
      position: absolute; top: 14px; left: 14px; z-index: 30;
      width: 246px; max-height: calc(100% - 150px); overflow-y: auto;
      padding: 12px; border-radius: 14px;
      background: rgba(14, 9, 26, .78); border: 1px solid var(--panel-brd);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      font-size: 12px; transition: border-color .2s;
    }
    .inspector.has-card { border-color: var(--panel-brd-hi); box-shadow: 0 14px 34px rgba(0,0,0,.45); }
    .inspector-empty { color: var(--ink-faint); line-height: 1.6; }

    /* 胜者横幅 */
    #winner-banner {
      position: absolute; top: 16px; left: 50%; z-index: 40;
      transform: translate(-50%, -16px); opacity: 0; pointer-events: none;
      padding: 12px 30px; border-radius: 16px; text-align: center;
      background:
        linear-gradient(rgba(24, 15, 44, .92), rgba(24, 15, 44, .92)) padding-box,
        linear-gradient(120deg, var(--amber), var(--acc2)) border-box;
      border: 1.5px solid transparent;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .55), 0 0 40px rgba(255, 179, 71, .18);
      transition: all .45s cubic-bezier(.2, 1.2, .3, 1);
    }
    #winner-banner.show { transform: translate(-50%, 0); opacity: 1; animation: bannerglow 2.4s ease-in-out infinite; }
    @keyframes bannerglow {
      0%, 100% { box-shadow: 0 18px 50px rgba(0,0,0,.55), 0 0 30px rgba(255,179,71,.15); }
      50% { box-shadow: 0 18px 50px rgba(0,0,0,.55), 0 0 55px rgba(255,92,168,.30); }
    }
    #winner-banner .wb-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
    #winner-banner .wb-sub { font-size: 11px; color: var(--ink-dim); margin-top: 3px; letter-spacing: 1px; }

    /* ---- 悬浮回放坞 ---- */
    .dock {
      position: absolute; left: 50%; transform: translateX(-50%); bottom: 14px; z-index: 35;
      width: min(700px, calc(100% - 32px));
      padding: 10px 14px 12px; border-radius: 16px;
      background: rgba(14, 9, 26, .82); border: 1px solid var(--panel-brd-hi);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 18px 44px rgba(0, 0, 0, .5);
    }
    .dock-timeline { position: relative; height: 26px; margin-bottom: 8px; }
    #timeline {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 100%; margin: 0; background: transparent; cursor: pointer;
    }
    #timeline::-webkit-slider-runnable-track {
      height: 5px; border-radius: 999px;
      background: linear-gradient(90deg, rgba(176,107,255,.75), rgba(255,92,168,.75));
      box-shadow: 0 0 10px rgba(176, 107, 255, .3);
    }
    #timeline::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; margin-top: -5.5px; border-radius: 50%;
      background: #fff; border: 3px solid var(--acc2);
      box-shadow: 0 0 12px rgba(255, 92, 168, .8);
      transition: transform .15s;
    }
    #timeline::-webkit-slider-thumb:hover { transform: scale(1.25); }
    #timeline::-moz-range-track {
      height: 5px; border-radius: 999px;
      background: linear-gradient(90deg, rgba(176,107,255,.75), rgba(255,92,168,.75));
    }
    #timeline::-moz-range-thumb {
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff; border: 3px solid var(--acc2);
      box-shadow: 0 0 12px rgba(255, 92, 168, .8);
    }
    #timeline-markers { position: absolute; left: 0; right: 0; bottom: -1px; height: 5px; pointer-events: none; }
    #timeline-markers .marker {
      position: absolute; top: 0; width: 2px; height: 5px; border-radius: 1px;
      background: #5a4a7a; transform: translateX(-1px);
    }
    .marker-attack, .marker-unit_death, .marker-headquarters_destroyed, .marker-base_destroyed { background: #ff5c7a; }
    .marker-move { background: #6ea8ff; }
    .marker-deploy { background: #ffd23e; }
    .marker-control_point_captured { background: #5cff9d; }
    .marker-income, .marker-comeback_supply { background: #ffb347; }
    .marker-heal, .marker-control_point_repair { background: #3effc8; }
    .marker-turn_end, .marker-round_end, .marker-turn_skipped { background: #b06bff; }
    .marker-game_over { background: #ff5ca8; width: 3px; }
    .marker-demolish { background: #ff9a3d; }

    .dock-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .dock-btn {
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
      background: rgba(255, 255, 255, .06); border: 1px solid var(--panel-brd);
      color: var(--ink-dim); font-size: 13px; line-height: 1;
      transition: all .18s; display: inline-flex; align-items: center; justify-content: center;
    }
    .dock-btn:hover { color: var(--ink); border-color: var(--panel-brd-hi); background: rgba(176, 107, 255, .14); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.35); }
    .dock-btn.play {
      width: 42px; height: 42px; font-size: 15px;
      background: var(--grad); border: 0; color: #140b26; font-weight: 900;
      box-shadow: 0 6px 20px rgba(255, 92, 168, .35);
    }
    .dock-btn.play:hover { filter: brightness(1.15); color: #140b26; }
    .dock-btn.play.active { animation: playpulse 1.4s ease-in-out infinite; }
    @keyframes playpulse {
      0%, 100% { box-shadow: 0 6px 20px rgba(255, 92, 168, .35); }
      50% { box-shadow: 0 6px 26px rgba(255, 92, 168, .65); }
    }
    #speed-select {
      padding: 6px 8px; border-radius: 9px; cursor: pointer;
      background: rgba(255, 255, 255, .06); border: 1px solid var(--panel-brd);
      color: var(--ink-dim); font-size: 12px; font-weight: 700;
    }
    #speed-select option { background: #1c1332; color: var(--ink); }
    #step-info {
      min-width: 76px; text-align: center; font-family: var(--mono); font-size: 12px;
      color: var(--ink-dim); font-variant-numeric: tabular-nums;
    }

    /* ---- 右侧情报面板 ---- */
    .intel { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .tabs { position: relative; display: flex; padding: 10px 12px 0; gap: 4px; flex-shrink: 0; }
    .tab {
      flex: 1; padding: 9px 4px 11px; cursor: pointer; background: none; border: 0;
      color: var(--ink-faint); font-size: 13px; font-weight: 800; letter-spacing: 1px;
      transition: color .2s;
    }
    .tab:hover { color: var(--ink-dim); }
    .tab.active { color: var(--ink); }
    .tab-ink {
      position: absolute; bottom: 0; height: 3px; border-radius: 3px 3px 0 0;
      background: var(--grad); box-shadow: 0 0 12px rgba(255, 92, 168, .5);
      transition: left .28s cubic-bezier(.3, 1.1, .4, 1), width .28s cubic-bezier(.3, 1.1, .4, 1);
    }
    .tab-pages { flex: 1; min-height: 0; position: relative; }
    .tab-page { display: none; height: 100%; overflow-y: auto; padding: 14px; }
    .tab-page.active { display: block; animation: pagein .3s cubic-bezier(.2, .8, .3, 1); }
    @keyframes pagein { from { opacity: 0; transform: translateX(10px); } }
    .tab-page h3 {
      margin: 0 0 10px; font-size: 11px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; color: var(--ink-faint);
    }

    /* 回合卡 */
    .turn-card {
      position: relative; padding: 14px; border-radius: 14px; margin-bottom: 14px;
      background: rgba(255, 255, 255, .04); border: 1px solid var(--panel-brd);
      overflow: hidden;
    }
    .turn-card::before {
      content: ''; position: absolute; inset: 0 auto 0 0; width: 4px;
      background: var(--oc, var(--acc)); box-shadow: 0 0 14px var(--oc, var(--acc));
    }
    .turn-round { font-size: 11px; letter-spacing: 2px; color: var(--ink-faint); font-weight: 800; text-transform: uppercase; }
    .turn-count { font-size: 26px; font-weight: 900; font-variant-numeric: tabular-nums; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .turn-body { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 8px; }
    .turn-player-label { font-size: 11px; color: var(--ink-faint); letter-spacing: 1px; margin-bottom: 3px; }
    .result-note {
      margin-top: 10px; padding: 8px 10px; border-radius: 10px; font-size: 12.5px; font-weight: 700;
      background: rgba(255, 179, 71, .10); border: 1px solid rgba(255, 179, 71, .30); color: #ffd9a0;
    }
    .ap-ring {
      position: relative; width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: conic-gradient(var(--acc2) calc(var(--p, 0) * 1turn), rgba(255, 255, 255, .08) 0);
      display: flex; align-items: center; justify-content: center;
      transition: --p .3s;
    }
    .ap-ring::before { content: ''; position: absolute; inset: 5px; border-radius: 50%; background: #180f2c; }
    .ap-ring span { position: relative; font: 800 12px var(--mono); color: var(--ink); }

    /* 玩家名（可改名按钮） */
    .player-name {
      background: none; border: 0; padding: 0; cursor: pointer;
      color: var(--oc, var(--ink-dim)); font-size: 14px; font-weight: 800;
      border-bottom: 1px dashed transparent; transition: all .15s;
    }
    .player-name:hover { border-bottom-color: currentColor; filter: brightness(1.25); }

    /* 资源 */
    .resource-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .resource-card {
      position: relative; padding: 10px 12px 10px 14px; border-radius: 12px;
      background: rgba(255, 255, 255, .04); border: 1px solid var(--panel-brd);
      overflow: hidden; transition: transform .18s, box-shadow .18s;
    }
    .resource-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.35); }
    .resource-card::before { content: ''; position: absolute; inset: 0 auto 0 0; width: 3px; background: var(--oc, var(--acc)); }
    .resource-card .player-name { font-size: 12px; }
    .resource-num { display: block; font: 800 20px var(--mono); color: var(--ink); margin-top: 3px; font-variant-numeric: tabular-nums; }
    .resource-label { font-size: 10.5px; color: var(--ink-faint); letter-spacing: 1.5px; }
    .resource-empty, .score-empty { color: var(--ink-faint); font-size: 12.5px; padding: 10px 2px; }

    /* 排行榜 */
    .score-row {
      position: relative; padding: 10px 12px; margin-bottom: 8px; border-radius: 12px;
      background: rgba(255, 255, 255, .04); border: 1px solid var(--panel-brd);
      overflow: hidden;
    }
    .score-row::before { content: ''; position: absolute; inset: 0 auto 0 0; width: 3px; background: var(--oc, var(--acc)); }
    .score-row.eliminated { opacity: .45; filter: saturate(.4); }
    .score-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .score-rank {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 24px; height: 18px; padding: 0 5px; margin-right: 7px; border-radius: 6px;
      font: 800 10.5px var(--mono); font-style: normal;
      background: rgba(255, 255, 255, .08); color: var(--ink-dim);
    }
    .score-row:first-of-type .score-rank { background: linear-gradient(120deg, #ffd23e, #ff9a3d); color: #241500; box-shadow: 0 0 12px rgba(255, 210, 62, .4); }
    .score-total { font: 800 16px var(--mono); color: var(--ink); font-variant-numeric: tabular-nums; }
    .score-status { font-style: normal; font-size: 10px; color: var(--danger); margin-left: 6px; letter-spacing: 1px; }
    .score-bar { height: 4px; border-radius: 999px; background: rgba(255, 255, 255, .07); margin: 8px 0 6px; overflow: hidden; }
    .score-bar i {
      display: block; height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--oc, var(--acc)), var(--oc, var(--acc)));
      box-shadow: 0 0 8px var(--oc, var(--acc));
      transition: width .5s cubic-bezier(.2, .8, .3, 1);
    }
    .score-breakdown { font-size: 10.5px; color: var(--ink-faint); line-height: 1.5; }

    /* 事件流 */
    #events { list-style: none; margin: 0; padding: 0; }
    #events li {
      position: relative; padding: 7px 10px 7px 12px; margin-bottom: 4px;
      border-radius: 9px; border-left: 3px solid var(--evc, #5a4a7a);
      background: rgba(255, 255, 255, .03);
      font-size: 12px; color: var(--ink-dim); cursor: pointer;
      transition: background .15s, color .15s, transform .15s;
    }
    #events li:hover { background: rgba(176, 107, 255, .10); color: var(--ink); transform: translateX(3px); }
    #events li .ev-seq { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); margin-right: 6px; }
    #events li.active {
      background: linear-gradient(90deg, rgba(176, 107, 255, .18), rgba(255, 92, 168, .08));
      color: var(--ink); border-left-color: var(--evc, var(--acc));
      animation: evflash .6s ease-out;
    }
    @keyframes evflash {
      0% { box-shadow: 0 0 0 0 rgba(176, 107, 255, .5); }
      100% { box-shadow: 0 0 0 12px rgba(176, 107, 255, 0); }
    }
    #events li[data-type="attack"], #events li[data-type="unit_death"], #events li[data-type="headquarters_destroyed"] { --evc: #ff5c7a; }
    #events li[data-type="move"] { --evc: #6ea8ff; }
    #events li[data-type="deploy"] { --evc: #ffd23e; }
    #events li[data-type="control_point_captured"] { --evc: #5cff9d; }
    #events li[data-type="income"], #events li[data-type="comeback_supply"] { --evc: #ffb347; }
    #events li[data-type="heal"], #events li[data-type="control_point_repair"] { --evc: #3effc8; }
    #events li[data-type="turn_end"], #events li[data-type="round_end"], #events li[data-type="turn_skipped"] { --evc: #b06bff; }
    #events li[data-type="game_over"] { --evc: #ff5ca8; }
    #events li[data-type="demolish"] { --evc: #ff9a3d; }
    #events li[data-type="player_eliminated"] { --evc: #ff5c7a; }

    /* 详情页 */
    #detail-content { font-size: 12px; color: var(--ink-dim); line-height: 1.6; word-break: break-all; }
    .ev-type-badge {
      display: inline-block; padding: 3px 10px; margin-right: 8px; border-radius: 999px;
      background: rgba(176, 107, 255, .14); border: 1px solid var(--panel-brd-hi);
      color: var(--ink); font: 700 11.5px var(--mono);
    }
    .ev-seq-dim { color: var(--ink-faint); font-family: var(--mono); font-size: 11px; }
    .ev-payload {
      display: block; margin-top: 10px; padding: 10px 12px; border-radius: 10px;
      background: rgba(0, 0, 0, .3); border: 1px solid var(--panel-brd);
      font-family: var(--mono); font-size: 11px; white-space: pre-wrap; color: #c9b8f0;
    }

    /* 检查器卡片 */
    .sel-card { margin-bottom: 10px; }
    .sel-card:last-child { margin-bottom: 0; }
    .sel-head { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
    .etoken {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
      font-size: 13px; font-weight: 900; color: #0d0716;
      background: var(--oc, #8d7cb5); box-shadow: 0 0 12px var(--oc, transparent);
    }
    .sel-type { font-size: 13px; font-weight: 800; color: var(--ink); }
    .sel-owner { font-size: 11px; color: var(--ink-faint); margin-top: 1px; }
    .sel-owner .player-name { font-size: 11.5px; }
    .sel-hp-row { margin-bottom: 9px; }
    .sel-hp-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-faint); margin-bottom: 4px; }
    .sel-hp-label strong { color: var(--ink); font-family: var(--mono); }
    .sel-hp-bar { height: 6px; border-radius: 999px; background: rgba(255, 255, 255, .08); overflow: hidden; }
    .sel-hp-fill { display: block; height: 100%; border-radius: 999px; transition: width .3s; }
    .sel-hp-fill.healthy { background: linear-gradient(90deg, #3effc8, #5cff9d); }
    .sel-hp-fill.wounded { background: linear-gradient(90deg, #ffd23e, #ffb347); }
    .sel-hp-fill.critical { background: linear-gradient(90deg, #ff5c7a, #ff8a5c); }
    .sel-stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
    .sel-stat-card {
      padding: 6px 4px; border-radius: 8px; text-align: center;
      background: rgba(255, 255, 255, .04); border: 1px solid rgba(255, 255, 255, .05);
    }
    .sel-stat-card span { display: block; font-size: 9.5px; color: var(--ink-faint); letter-spacing: 1px; }
    .sel-stat-card strong { display: block; font: 800 13px var(--mono); color: var(--ink); margin-top: 2px; }
    .sel-stat-card.attack strong { color: #ff9d7a; }
    .sel-stat-card.defense strong { color: #a9baff; }
    .sel-stat-card.move strong { color: #8affb9; }
    .sel-stat-card.range strong { color: #ffe08a; }
    .sel-stat-card.heal strong { color: #8affea; }
    .sel-stat-card.cost strong { color: #ffcf99; }
    .sel-note { font-size: 11px; color: var(--ink-faint); padding: 6px 0; }
    .sel-coord { margin-top: 8px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); }

    /* 玩家配色（o- 前缀工具类） */
    .o-player-a { --oc: #4de3ff; } .o-player-b { --oc: #ff7a59; }
    .o-player-c { --oc: #7dff6a; } .o-player-d { --oc: #c678ff; }
    .o-player-e { --oc: #ffd23e; } .o-player-f { --oc: #3effc8; }
    .o-player-g { --oc: #ff5c8a; } .o-player-h { --oc: #8ea2ff; }
    .o-neutral { --oc: #9a8bb8; }

    /* ============ 响应式 ============ */
    @media (max-width: 1120px) {
      body { overflow: auto; }
      .deck { grid-template-columns: 1fr; height: auto; }
      .stage { min-height: 62vh; order: -1; }
      .rail { flex-direction: row; flex-wrap: wrap; }
      .rail-block { flex: 1 1 220px; }
      .rail-foot { flex-basis: 100%; }
      .intel { min-height: 420px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-gem"></span>
      <div class="brand-text">
        <h1>全息观战台 <span class="version-badge"></span></h1>
        <span class="brand-sub">HEX V2 // SPECTATOR LINK</span>
      </div>
    </div>
    <div class="top-status">
      <span id="live-pill" class="live-pill offline"><span class="live-dot"></span><span id="live-text">未连接</span></span>
      <span id="status" class="status-text"></span>
    </div>
    <div class="top-actions">
      <div id="settings-wrap">
        <button id="btn-settings" class="icon-btn" title="设置">&#9881;</button>
        <div id="settings-popover">
          <form id="settings-form" class="setting-form">
            <label class="toggle-row">
            <span>自动刷新</span>
            <span class="toggle"><input type="checkbox" id="auto-refresh" checked /><span class="slider"></span></span>
          </label>
          <label class="setting-row">
            刷新间隔 <input type="number" id="refresh-interval" min="1" max="60" value="5" /> 秒
          </label>
          <label class="toggle-row">
            <span>跟随最新</span>
            <span class="toggle"><input type="checkbox" id="follow-latest" /><span class="slider"></span></span>
          </label>
          <div class="settings-divider"></div>
          <label class="setting-field">
            <span>Control token</span>
            <input id="settings-control-token" type="password" placeholder="Control token" autocomplete="off" />
          </label>
            <button id="btn-save-control-token" type="submit" class="settings-action">保存 Token</button>
          </form>
        </div>
      </div>
    </div>
  </header>

  <main class="deck">
    <!-- 左侧指挥轨 -->
    <aside class="rail panel anim-in" style="--d:.05s">
      <section class="rail-block">
        <h2>对局</h2>
        <div class="game-picker">
          <select id="game-select" class="native-game-select" tabindex="-1" aria-hidden="true"><option value="">-- 选择对局 --</option></select>
          <button id="game-picker-button" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span id="game-picker-label">-- 选择对局 --</span>
          </button>
          <div id="game-picker-menu" role="listbox" aria-label="选择对局"></div>
        </div>
        <div class="rail-row">
          <button id="refresh-list" class="rail-btn" type="button">刷新列表</button>
          <button id="delete-game" class="rail-btn danger" type="button" title="删除当前对局">删除对局</button>
        </div>
      </section>
      <section class="rail-block">
        <h2>回放文件</h2>
        <div class="rail-row">
          <button id="btn-export-json" class="rail-btn" type="button" title="导出为 JSON 文件">导出 JSON</button>
          <button id="btn-import" class="rail-btn" type="button" title="从 JSON 文件导入对局">导入回放</button>
        </div>
        <input type="file" id="import-file" accept=".json" hidden />
      </section>
      <section class="rail-block">
        <h2>图例</h2>
        <div class="legend-grid">
          <div class="legend-item"><span class="swatch plain"></span>平原</div>
          <div class="legend-item"><span class="swatch water"></span>水域</div>
          <div class="legend-item"><span class="swatch blocker"></span>障碍</div>
          <div class="legend-item"><span class="swatch cp"></span>据点</div>
          <div class="legend-item"><span class="swatch hq"></span>指挥部</div>
          <div class="legend-item"><span class="swatch unit"></span>单位</div>
        </div>
      </section>
      <div class="rail-foot">
        快捷键：<kbd>Space</kbd> 播放/暂停 · <kbd>←</kbd> 上一步 · <kbd>→</kbd> 下一步<br />
        点击玩家名称可改名 · 点击事件流可跳转
      </div>
    </aside>

    <!-- 中央全息棋盘 -->
    <section class="stage panel anim-in" style="--d:.14s">
      <canvas id="board" width="840" height="840"></canvas>
      <div id="cell-info" class="cell-chip"></div>
      <div id="inspector" class="inspector">
        <div class="inspector-empty">点击或悬停棋盘，查看单位、指挥部或据点信息</div>
      </div>
      <div id="winner-banner"></div>
      <div class="dock">
        <div class="dock-timeline">
          <input type="range" id="timeline" min="0" max="0" value="0" />
          <div id="timeline-markers"></div>
        </div>
        <div class="dock-row">
          <button id="btn-start" class="dock-btn" type="button" title="回到开始">⏮</button>
          <button id="btn-prev" class="dock-btn" type="button" title="上一步 (←)">◀</button>
          <button id="btn-play" class="dock-btn play" type="button" title="播放/暂停 (Space)">▶</button>
          <button id="btn-next" class="dock-btn" type="button" title="下一步 (→)">▶</button>

            <option value="500" selected>1x</option>
            <option value="200">2.5x</option>
            <option value="100">5x</option>
            <option value="50">10x</option>
          </select>
          <span id="step-info">0 / 0</span>
        </div>
      </div>
    </section>

    <!-- 右侧情报面板 -->

        <button class="tab" type="button" data-tab="events">事件流</button>
        <button class="tab" type="button" data-tab="detail">详情</button>
        <span class="tab-ink"></span>
      </div>
      <div class="tab-pages">
        <section class="tab-page active" data-page="situation">

          <div id="score-panel"></div>

        <section class="tab-page" data-page="events">
          <ul id="events"></ul>

        <section class="tab-page" data-page="detail">
          <h3>当前操作</h3>
          <div id="detail-content">选择对局后使用时间轴回放</div>
        </section>
      </div>
    </aside>
  </main>

  <script src="/version.js"></script>
  <script>
  'use strict';
  /* ================= 常量 ================= */
  const HEX_SIZE = 28;
  const PAD = 42;

  const TERRAIN = { plain: '#1d1533', water: '#123a5e', blocker: '#43354f' };

    'player_a', 'player_b', 'player_c', 'player_d',

  };
  const UNIT_NAMES = { infantry: '步兵', scout: '侦察兵', heavy: '重装', ranger: '远程兵', support: '支援兵' };
  const CONTROL_POINT_NAMES = { supply: '补给站', forward_base: '前线基地', repair: '维修站' };
  const UNIT_SHORT_NAMES = { infantry: '步', scout: '侦', heavy: '重', ranger: '远', support: '支', headquarters: '部' };
  const CONTROL_POINT_SHORT_NAMES = { supply: '给', forward_base: '前', repair: '修' };

  const APP_VERSION = window.APP_VERSION;
  const REPLAY_EXPORT_FORMAT = 'hex-v2-replay';
  const REPLAY_SCHEMA_VERSION = APP_VERSION;

  /* ================= 全局状态 ================= */
  let gameConfig = null;
  let playerNames = defaultPlayerNames();
  let allEvents = [];
  let currentStep = -1;
  let playing = false;
  let playTimer = null;
  let liveSse = null;
  let pinnedReplayStep = false;
  let state = null;
  let hoverCell = null;
  let layout = { minX: 0, minY: 0, width: 840, height: 840 };
  let gamesList = [];
  let bgGrad = null;

  // 动画视图状态
  const unitView = new Map(); // id -> {x,y,tx,ty,alpha,tAlpha,born,data}
  let effects = [];           // {kind,x,y,x2,y2,color,start,dur,size}

  /* ================= DOM ================= */
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const gameSelect = document.getElementById('game-select');
  const gamePicker = document.querySelector('.game-picker');
  const gamePickerButton = document.getElementById('game-picker-button');
  const gamePickerLabel = document.getElementById('game-picker-label');
  const gamePickerMenu = document.getElementById('game-picker-menu');
  const refreshBtn = document.getElementById('refresh-list');
  const deleteGameBtn = document.getElementById('delete-game');
  const statusEl = document.getElementById('status');
  const livePill = document.getElementById('live-pill');
  const liveText = document.getElementById('live-text');
  const resourcesEl = document.getElementById('resources');
  const scorePanelEl = document.getElementById('score-panel');
  const turnInfoEl = document.getElementById('turn-info');
